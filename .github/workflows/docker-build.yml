name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*.*.*" # Only trigger on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch: # Allow manual trigger if needed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Image Info
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "📦 Version: ${{ github.ref_name }}"
          echo "🏷️  Available tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/   - /'
          echo ""
          echo "📋 Pull command:"
          echo "   docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo ""
          echo "🚀 Run command (set secrets in GitHub repo settings first):"
          echo "   docker run -d -p 3000:3000 \\"
          echo "     -e APP_ID=<your-app-id> \\"
          echo "     -e PRIVATE_KEY=<your-private-key> \\"
          echo "     -e WEBHOOK_SECRET=<your-webhook-secret> \\"
          echo "     -e JULES_API_KEY=<your-jules-api-key> \\"
          echo "     -e WEBHOOK_PROXY_URL=<your-smee-url> \\"
          echo "     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
